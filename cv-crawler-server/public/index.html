<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CV Crawler - Job Filter</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="app">
    <header>
      <h1>CV Crawler</h1>
      <span id="total-badge">0 jobs</span>
      <a href="/emails.html" style="font-size:12px;color:#1a73e8;font-weight:600;text-decoration:none;">📧 Emails</a>
    </header>

    <section id="stats-bar">
      <div class="stat"><span class="stat-num" id="stat-total">0</span> Jobs</div>
      <div class="stat"><span class="stat-num" id="stat-companies">0</span> Companies</div>
      <div class="stat"><span class="stat-num" id="stat-platforms">0</span> Platforms</div>
    </section>

    <section id="filter-section">
      <div class="filter-row">
        <input type="text" id="filter-title" placeholder="Title keywords..." autocomplete="off">
        <input type="text" id="filter-location" placeholder="Location..." autocomplete="off">
          <input type="text" id="filter-company" placeholder="Company..." autocomplete="off">
          <input type="text" id="filter-exclude" placeholder="Exclude words..." autocomplete="off">
          <select id="filter-platform">
            <option value="">All platforms</option>
          </select>
          <button id="btn-filter" class="btn-primary">Filter</button>
          <button id="btn-clear-filter" class="btn-secondary">Clear</button>
      </div>
    </section>

    <section id="result-section">
      <div class="result-header">
        <span id="result-count">Showing 0 results</span>
        <div class="result-actions">
          <button id="btn-export-csv" class="btn-small">Export CSV</button>
          <button id="btn-export-json" class="btn-small">Export JSON</button>
          <button id="btn-clear-jobs" class="btn-small btn-danger">Clear Jobs</button>
        </div>
      </div>
      <div id="job-list"></div>
      <div id="pagination"></div>
    </section>
  </div>

  <script src="app.js"></script>
</body>
</html>
